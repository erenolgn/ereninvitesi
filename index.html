<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online 2D Şehir ve Yarış Oyunu</title>
    <!-- PeerJS: Online bağlantı sağlayan kütüphane -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #111; overflow: hidden; font-family: 'Segoe UI', Tahoma, sans-serif; user-select: none; }
        canvas { display: block; }
        
        .overlay-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; z-index: 10; }
        
        input[type="text"] { padding: 15px; font-size: 20px; border-radius: 8px; border: 2px solid #555; background: #222; color: white; margin-bottom: 20px; width: 300px; text-align: center; }
        button { padding: 15px 30px; font-size: 20px; border-radius: 8px; border: none; background: #ff3333; color: white; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:hover { background: #ff6666; transform: scale(1.05); }
        
        .car-container { display: flex; gap: 20px; margin-top: 20px; flex-wrap: wrap; justify-content: center; max-width: 80%; }
        .car-card { background: #333; padding: 15px; border-radius: 8px; cursor: pointer; transition: 0.2s; text-align: center; border: 2px solid transparent; }
        .car-card:hover { transform: scale(1.05); border-color: #ff3333; background: #444; }
        .car-card img { width: 64px; height: 128px; object-fit: contain; }
        
        .lobby-box { background: #222; padding: 30px; border-radius: 10px; text-align: center; margin: 10px; border: 1px solid #444; width: 400px; }
        .code-display { font-size: 24px; color: gold; margin: 15px 0; font-family: monospace; background: #000; padding: 10px; user-select: all; cursor: copy; }

        #ui { position: absolute; top: 20px; left: 20px; color: white; font-size: 24px; font-weight: bold; text-shadow: 2px 2px 0 #000; display: none; z-index: 5; }
        #checkpoint-ui { position: absolute; top: 20px; right: 20px; color: #ff3333; font-size: 28px; font-weight: bold; text-shadow: 2px 2px 0 #000; display: none; z-index: 5; }
        #interaction-prompt { position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: #ff3333; padding: 15px 30px; border-radius: 8px; font-size: 22px; font-weight: bold; display: none; z-index: 5; border: 2px solid #ff3333; text-align: center; }
        #race-ui { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; font-size: 140px; font-weight: bold; text-shadow: 5px 5px 0 #ff0000; display: none; z-index: 6; text-align: center; }
        #race-result { font-size: 60px; color: gold; display: block; margin-top: 20px; }
    </style>
</head>
<body>

    <!-- AŞAMA 1: İsim Ekranı -->
    <div id="name-screen" class="overlay-screen">
        <h1>SÜRÜCÜ KİMLİĞİ</h1>
        <input type="text" id="player-name-input" placeholder="İsminizi Yazın" maxlength="12">
        <button onclick="saveName()">Devam Et</button>
    </div>

    <!-- AŞAMA 2: Araç Seçimi -->
    <div id="menu-screen" class="overlay-screen" style="display: none;">
        <h1>ARACINI SEÇ</h1>
        <p style="color:#aaa; font-size: 18px;">Hareket: W, A, S, D | Drift: BOŞLUK | Etkileşim: E</p>
        <div class="car-container" id="car-list"></div>
    </div>

    <!-- AŞAMA 3: Online Lobi -->
    <div id="lobby-screen" class="overlay-screen" style="display: none;">
        <h1>ONLİNE BAĞLANTI</h1>
        <div style="display: flex; gap: 20px;">
            <div class="lobby-box">
                <h2>Oda Kur</h2>
                <p>Arkadaşının bağlanması için bu kodu paylaş:</p>
                <button id="btn-host" onclick="startHost()">Kodu Oluştur</button>
                <div class="code-display" id="my-code">KOD BEKLENİYOR...</div>
                <p id="host-status" style="color: #aaa;"></p>
            </div>
            <div class="lobby-box">
                <h2>Odaya Katıl</h2>
                <p>Arkadaşından aldığın kodu buraya gir:</p>
                <input type="text" id="join-code-input" placeholder="Oda Kodunu Yapıştır">
                <button id="btn-join" onclick="joinRoom()">Bağlan</button>
                <p id="join-status" style="color: #aaa;"></p>
            </div>
        </div>
    </div>

    <!-- OYUN ARAYÜZÜ -->
    <div id="ui">HIZ: <span id="speed-display">0</span> km/h</div>
    <div id="checkpoint-ui">CHECKPOINT: <span id="cp-display">0 / 0</span></div>
    <div id="interaction-prompt"></div>
    <div id="race-ui"><span id="countdown-text">3</span><br><span id="race-result"></span></div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;

        const carImagesNames = ['araba1.png', 'araba2.png', 'araba3.png', 'araba4.png', 'araba5.png'];
        const buildingNames = ['america.png', 'china.png', 'england.png', 'france.png', 'germany.png', 'greece.png', 'italy.png', 'japan.png', 'poland.png', 'russia.png', 'spain.png', 'turkiye.png'];
        const images = {};

        function loadImage(name, type) {
            const img = new Image(); img.src = name;
            img.onerror = () => img.src = createDummyImage(name, type);
            images[name] = img;
        }

        function createDummyImage(text, type) {
            const tCanvas = document.createElement('canvas');
            tCanvas.width = type === 'car' ? 64 : 128; tCanvas.height = type === 'car' ? 128 : 128;
            const tCtx = tCanvas.getContext('2d');
            tCtx.fillStyle = type === 'car' ? `hsl(${Math.random()*360}, 80%, 50%)` : '#444';
            tCtx.fillRect(0,0, tCanvas.width, tCanvas.height);
            tCtx.fillStyle = "white"; tCtx.font = "bold 16px Arial"; tCtx.fillText(text.split('.')[0], 10, tCanvas.height/2);
            return tCanvas.toDataURL();
        }

        carImagesNames.forEach(name => loadImage(name, 'car'));
        buildingNames.forEach(name => loadImage(name, 'building'));

        // OYUNCU VE ONLİNE VERİLERİ
        let playerName = "Sürücü";
        let gameState = 'auth'; // auth, menu, lobby, freeroam, pre_race, racing
        
        let peer = null;
        let connection = null;
        
        let otherPlayer = {
            active: false,
            x: 0, y: 0, angle: 0, img: null, name: "Arkadaş", speed: 0, inRace: false, cpIndex: 0
        };

        const keys = { w: false, a: false, s: false, d: false, ' ': false, e: false };
        window.addEventListener('keydown', e => { let key = e.key.toLowerCase(); if(key===' ') key=' '; if(keys.hasOwnProperty(key)) keys[key] = true; });
        window.addEventListener('keyup', e => { let key = e.key.toLowerCase(); if(key===' ') key=' '; if(keys.hasOwnProperty(key)) keys[key] = false; });

        const mapBlocks = 32; 
        const roadWidth = 320; 
        const blockSize = 800; 
        const totalBlockSize = roadWidth + blockSize;
        const mapSize = mapBlocks * totalBlockSize;
        
        const buildings = [];
        const intersections = [];

        function generateCity() {
            for (let x = 0; x < mapBlocks; x++) {
                for (let y = 0; y < mapBlocks; y++) {
                    const worldX = x * totalBlockSize; const worldY = y * totalBlockSize;
                    intersections.push({ gridX: x, gridY: y, x: worldX + roadWidth/2, y: worldY + roadWidth/2 });

                    const blockStartX = worldX + roadWidth; const blockStartY = worldY + roadWidth;
                    const bSize = 200; const padding = 40;
                    const positions = [
                        {bx: blockStartX + padding, by: blockStartY + padding},
                        {bx: blockStartX + blockSize - bSize - padding, by: blockStartY + padding},
                        {bx: blockStartX + padding, by: blockStartY + blockSize - bSize - padding},
                        {bx: blockStartX + blockSize - bSize - padding, by: blockStartY + blockSize - bSize - padding}
                    ];
                    positions.forEach(pos => {
                        if(Math.random() > 0.1) buildings.push({ x: pos.bx, y: pos.by, w: bSize, h: bSize, img: buildingNames[Math.floor(Math.random() * buildingNames.length)] });
                    });
                }
            }
        }
        generateCity();

        class Car {
            constructor(x, y, isBot = false) {
                this.x = x; this.y = y; this.width = 44; this.height = 88;
                this.angle = -Math.PI / 2; this.speed = 0; this.isBot = isBot;
                this.maxSpeed = 15; this.acceleration = 0.25; this.friction = 0.95; 
                this.velX = 0; this.velY = 0; this.img = null;
                this.inRace = false; this.cpIndex = 0; this.targetAngle = this.angle;
                this.mistakeProb = isBot ? (0.01 + Math.random() * 0.05) : 0;
                this.mistakeFrames = 0; this.mistakeAngle = 0; this.justTurned = false;
                this.offScreenFrames = 0; 
            }

            draw(ctx) {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle + Math.PI/2);
                if(this.img && images[this.img]) ctx.drawImage(images[this.img], -this.width/2, -this.height/2, this.width, this.height);
                else { ctx.fillStyle = this.isBot ? 'red' : 'blue'; ctx.fillRect(-this.width/2, -this.height/2, this.width, this.height); }
                
                if(!this.isBot && keys[' '] && Math.abs(this.speed) > 4) {
                    ctx.fillStyle = 'rgba(0,0,0,0.3)';
                    ctx.beginPath(); ctx.arc(-15, 30, 6, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc(15, 30, 6, 0, Math.PI*2); ctx.fill();
                }
                ctx.restore();
            }

            checkCollisions() {
                if (this.isBot && !this.inRace) return; 
                for(let b of buildings) {
                    if(Math.abs(b.x - this.x) > 300 || Math.abs(b.y - this.y) > 300) continue;
                    if (this.x + this.width/2 > b.x && this.x - this.width/2 < b.x + b.w && this.y + this.height/2 > b.y && this.y - this.height/2 < b.y + b.h) {
                        this.x -= this.velX * 1.5; this.y -= this.velY * 1.5;
                        this.speed *= -0.4; this.velX *= -0.4; this.velY *= -0.4;
                    }
                }
                if(this.x < 0) { this.x = 0; this.speed *= -0.4; }
                if(this.x > mapSize) { this.x = mapSize; this.speed *= -0.4; }
                if(this.y < 0) { this.y = 0; this.speed *= -0.4; }
                if(this.y > mapSize) { this.y = mapSize; this.speed *= -0.4; }
            }

            respawnBot() {
                let spawnGridX, spawnGridY, tryX, tryY;
                do {
                    spawnGridX = Math.floor(Math.random() * mapBlocks);
                    spawnGridY = Math.floor(Math.random() * mapBlocks);
                    tryX = spawnGridX * totalBlockSize + roadWidth/2;
                    tryY = spawnGridY * totalBlockSize + roadWidth/2;
                } while (Math.abs(tryX - player.x) < canvas.width && Math.abs(tryY - player.y) < canvas.height); 
                this.x = tryX; this.y = tryY;
                this.angle = [0, Math.PI/2, Math.PI, -Math.PI/2][Math.floor(Math.random() * 4)];
                this.targetAngle = this.angle; this.speed = 3 + Math.random() * 2;
                this.img = carImagesNames[Math.floor(Math.random() * carImagesNames.length)];
                this.offScreenFrames = 0;
            }
        }

        const player = new Car(totalBlockSize + roadWidth/2, totalBlockSize + roadWidth/2);
        player.update = function() {
            if (gameState !== 'freeroam' && gameState !== 'racing') return;
            let enginePower = 0;
            if (keys.w) enginePower = this.acceleration;
            if (keys.s) enginePower = -this.acceleration * 0.9; 
            this.speed += enginePower; this.speed *= this.friction; 
            if (this.speed > this.maxSpeed) this.speed = this.maxSpeed;
            if (this.speed < -this.maxSpeed * 0.4) this.speed = -this.maxSpeed * 0.4; 
            let baseTurnSpeed = 0.055;
            if(Math.abs(this.speed) > 0.5) {
                let dir = this.speed > 0 ? 1 : -1;
                let turnSpeed = baseTurnSpeed * (1 - (Math.abs(this.speed) / (this.maxSpeed * 2.5)));
                if (keys.a) this.angle -= turnSpeed * dir;
                if (keys.d) this.angle += turnSpeed * dir;
            }
            let grip = keys[' '] ? 0.85 : 0.96; 
            let targetVelX = Math.cos(this.angle) * this.speed; let targetVelY = Math.sin(this.angle) * this.speed;
            this.velX = (this.velX * (1 - grip)) + (targetVelX * grip); this.velY = (this.velY * (1 - grip)) + (targetVelY * grip);
            this.x += this.velX; this.y += this.velY;
            this.checkCollisions();

            // ONLİNE VERİ GÖNDERİMİ (Saniyede 60 kere arkadaşına konumunu atar)
            if (connection && connection.open) {
                connection.send({
                    type: 'UPDATE',
                    x: this.x, y: this.y, angle: this.angle, img: this.img, name: playerName, inRace: this.inRace, cpIndex: this.cpIndex
                });
            }
        };

        const bots = [];
        const directions = [0, Math.PI/2, Math.PI, -Math.PI/2]; 
        for(let i=0; i<150; i++) { 
            let spawnGridX = Math.floor(Math.random() * mapBlocks); let spawnGridY = Math.floor(Math.random() * mapBlocks);
            let bot = new Car(spawnGridX * totalBlockSize + roadWidth/2, spawnGridY * totalBlockSize + roadWidth/2, true);
            bot.img = carImagesNames[Math.floor(Math.random() * carImagesNames.length)];
            bot.angle = directions[Math.floor(Math.random() * directions.length)];
            bot.speed = 3 + Math.random() * 2; bot.targetAngle = bot.angle;
            bot.update = function() {
                if (gameState === 'pre_race') return;
                if (this.inRace && gameState === 'racing') {
                    const botMaxRaceSpeed = player.maxSpeed * 0.20; 
                    let targetCP = currentRace.route[this.cpIndex];
                    if (targetCP) {
                        let dx = targetCP.x - this.x; let dy = targetCP.y - this.y;
                        let desiredAngle = Math.atan2(dy, dx);
                        if (this.mistakeFrames === 0 && Math.random() < (this.mistakeProb / 60)) { 
                            this.mistakeAngle = (Math.random() - 0.5) * 1.8; this.mistakeFrames = 20 + Math.floor(Math.random() * 30); 
                        }
                        if (this.mistakeFrames > 0) { desiredAngle += this.mistakeAngle; this.mistakeFrames--; this.speed *= 0.90; } 
                        else { this.speed += this.acceleration * 0.15; if(this.speed > botMaxRaceSpeed) this.speed = botMaxRaceSpeed; }
                        let angleDiff = desiredAngle - this.angle;
                        while (angleDiff > Math.PI) angleDiff -= Math.PI * 2; while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
                        if (Math.abs(angleDiff) > 0.15) this.speed *= 0.88; 
                        let turnSpeed = 0.05;
                        if (angleDiff > turnSpeed) this.angle += turnSpeed; else if (angleDiff < -turnSpeed) this.angle -= turnSpeed; else this.angle = desiredAngle;
                    } else this.speed *= 0.9;
                    this.velX = Math.cos(this.angle) * this.speed; this.velY = Math.sin(this.angle) * this.speed;
                    this.x += this.velX; this.y += this.velY;
                } else {
                    this.velX = Math.cos(this.angle) * this.speed; this.velY = Math.sin(this.angle) * this.speed;
                    this.x += this.velX; this.y += this.velY;
                    if(Math.abs(this.angle - this.targetAngle) > 0.05) this.angle += (this.targetAngle > this.angle) ? 0.05 : -0.05;
                    let inIntersection = false;
                    for(let inter of intersections) {
                        if(Math.abs(this.x - inter.x) <= this.speed && Math.abs(this.y - inter.y) <= this.speed && !this.justTurned) {
                            this.x = inter.x; this.y = inter.y; 
                            this.targetAngle += [-Math.PI/2, 0, Math.PI/2][Math.floor(Math.random() * 3)];
                            this.justTurned = true; inIntersection = true; break;
                        }
                    }
                    if(!inIntersection) this.justTurned = false;
                    
                    let isVisible = (this.x > camera.x - 300 && this.x < camera.x + canvas.width + 300 && this.y > camera.y - 300 && this.y < camera.y + canvas.height + 300);
                    if (!isVisible) { this.offScreenFrames++; if (this.offScreenFrames > 60 * 30) this.respawnBot(); } 
                    else this.offScreenFrames = 0; 
                }
                this.checkCollisions();
            };
            bots.push(bot);
        }

        const raceStarters = [
            { x: totalBlockSize + roadWidth/2, y: totalBlockSize + roadWidth/2, gridX: 1, gridY: 1 },
            { x: totalBlockSize*5 + roadWidth/2, y: totalBlockSize*2 + roadWidth/2, gridX: 5, gridY: 2 },
            { x: totalBlockSize*2 + roadWidth/2, y: totalBlockSize*8 + roadWidth/2, gridX: 2, gridY: 8 },
            { x: totalBlockSize*10 + roadWidth/2, y: totalBlockSize*10 + roadWidth/2, gridX: 10, gridY: 10 },
            { x: totalBlockSize*15 + roadWidth/2, y: totalBlockSize*5 + roadWidth/2, gridX: 15, gridY: 5 }
        ];

        let currentRace = { active: false, route: [], racers: [] };

        function generateRoute(startGridX, startGridY) {
            let route = []; let cx = startGridX, cy = startGridY; let lastDir = -1;
            const dirs = [[0,-1], [1,0], [0,1], [-1,0]]; 
            let visited = new Set(); visited.add(`${cx},${cy}`);

            for(let i = 0; i < 25; i++) { 
                let validDirs = []; let unvisitedDirs = [];
                for(let d=0; d<4; d++) {
                    if (d === (lastDir + 2) % 4) continue; 
                    let nx = cx + dirs[d][0]; let ny = cy + dirs[d][1];
                    if (nx >= 1 && nx < mapBlocks-1 && ny >= 1 && ny < mapBlocks-1) {
                        validDirs.push(d); if (!visited.has(`${nx},${ny}`)) unvisitedDirs.push(d); 
                    }
                }
                let choices = unvisitedDirs.length > 0 ? unvisitedDirs : validDirs;
                if(choices.length === 0) break; 
                let chosenDir = choices[Math.floor(Math.random() * choices.length)];
                cx += dirs[chosenDir][0]; cy += dirs[chosenDir][1]; lastDir = chosenDir; visited.add(`${cx},${cy}`);
                route.push({ x: cx * totalBlockSize + roadWidth/2, y: cy * totalBlockSize + roadWidth/2, gridX: cx, gridY: cy });
            }
            return route;
        }

        // Yarış Başlatma (Hem yerel hem de online arkadaşa bildirim yollar)
        function startRaceLogic(starter, isRemote = false, remoteRoute = null) {
            gameState = 'pre_race';
            document.getElementById('interaction-prompt').style.display = 'none';
            document.getElementById('checkpoint-ui').style.display = 'block';
            
            const raceUI = document.getElementById('race-ui'); const cdText = document.getElementById('countdown-text');
            const resText = document.getElementById('race-result');
            raceUI.style.display = 'block'; resText.innerText = "YENİ ROTA OLUŞTURULDU!";

            if(isRemote) currentRace.route = remoteRoute; // Arkadaş başlattıysa onun rotasını kullan
            else {
                currentRace.route = generateRoute(starter.gridX, starter.gridY);
                // Arkadaşa haber ver
                if (connection && connection.open) connection.send({ type: 'RACE_START', route: currentRace.route, starter: starter });
            }

            document.getElementById('cp-display').innerText = `0 / ${currentRace.route.length}`;
            let firstCP = currentRace.route[0]; let startAngle = Math.atan2(firstCP.y - starter.y, firstCP.x - starter.x);

            player.x = starter.x; player.y = starter.y; player.angle = startAngle; 
            player.speed = 0; player.velX = 0; player.velY = 0; player.cpIndex = 0; player.inRace = true;

            currentRace.racers = [player];

            for(let i=0; i<3; i++) {
                let rBot = bots[i];
                rBot.x = player.x + (Math.cos(startAngle + Math.PI/2) * (i%2===0 ? 80 : -80)); 
                rBot.y = player.y + (Math.sin(startAngle + Math.PI/2) * (i%2===0 ? 80 : -80));
                rBot.angle = startAngle; rBot.targetAngle = startAngle; rBot.speed = 0; rBot.cpIndex = 0; rBot.inRace = true;
                currentRace.racers.push(rBot);
            }

            let count = 3; cdText.innerText = count;
            let interval = setInterval(() => {
                count--;
                if(count > 0) cdText.innerText = count;
                else if(count === 0) { cdText.innerText = "GİT!"; cdText.style.color = "#00ff00"; gameState = 'racing'; } 
                else { clearInterval(interval); cdText.innerText = ""; resText.innerText = ""; raceUI.style.display = 'none'; cdText.style.color = "#ff3333"; }
            }, 1000);
        }

        function checkRaceProgress() {
            if(gameState !== 'racing') return;
            for(let racer of currentRace.racers) {
                if (racer.cpIndex < currentRace.route.length) {
                    let targetCP = currentRace.route[racer.cpIndex];
                    let dist = Math.hypot(racer.x - targetCP.x, racer.y - targetCP.y);
                    if (dist < 180) { 
                        racer.cpIndex++;
                        if (racer === player) document.getElementById('cp-display').innerText = `${racer.cpIndex} / ${currentRace.route.length}`;
                        
                        if (racer.cpIndex === currentRace.route.length) {
                            gameState = 'post_race'; document.getElementById('checkpoint-ui').style.display = 'none';
                            const raceUI = document.getElementById('race-ui'); const cdText = document.getElementById('countdown-text');
                            raceUI.style.display = 'block';
                            
                            if(racer === player) { cdText.innerText = "KAZANDIN!"; cdText.style.color = "gold"; } 
                            else { cdText.innerText = "KAYBETTİN!"; cdText.style.color = "red"; }
                            
                            setTimeout(() => {
                                raceUI.style.display = 'none'; gameState = 'freeroam';
                                currentRace.racers.forEach(r => { r.inRace = false; });
                            }, 4000); break;
                        }
                    }
                }
            }
        }

        const camera = { x: 0, y: 0 };

        function drawNameTag(name, x, y, color) {
            ctx.fillStyle = "rgba(0,0,0,0.6)"; ctx.fillRect(x - 50, y - 60, 100, 25);
            ctx.fillStyle = color; ctx.font = "bold 16px Arial"; ctx.textAlign = "center";
            ctx.fillText(name, x, y - 42);
        }

        function gameLoop() {
            if (gameState === 'freeroam' || gameState === 'pre_race' || gameState === 'racing' || gameState === 'post_race') {
                player.update();
                bots.forEach(bot => bot.update());
                checkRaceProgress();

                document.getElementById('speed-display').innerText = Math.abs(Math.floor(player.speed * 11));

                const promptUi = document.getElementById('interaction-prompt');
                if(gameState === 'freeroam') {
                    let nearRace = false;
                    for(let rs of raceStarters) {
                        if(Math.hypot(player.x - rs.x, player.y - rs.y) < 150) {
                            nearRace = true; promptUi.style.display = 'block';
                            promptUi.innerHTML = `<b>SOKAK YARIŞI</b><br>Başlamak için 'E' tuşuna bas`;
                            if(keys.e) { keys.e = false; startRaceLogic(rs); }
                            break;
                        }
                    }
                    if(!nearRace) promptUi.style.display = 'none';
                }

                camera.x = player.x - canvas.width / 2; camera.y = player.y - canvas.height / 2;

                ctx.fillStyle = '#2c3e50'; ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.save(); ctx.translate(-camera.x, -camera.y);

                let startGridX = Math.max(0, Math.floor(camera.x / totalBlockSize)); let endGridX = Math.min(mapBlocks, Math.ceil((camera.x + canvas.width) / totalBlockSize));
                let startGridY = Math.max(0, Math.floor(camera.y / totalBlockSize)); let endGridY = Math.min(mapBlocks, Math.ceil((camera.y + canvas.height) / totalBlockSize));

                for (let x = startGridX; x < endGridX; x++) {
                    for (let y = startGridY; y < endGridY; y++) {
                        let wX = x * totalBlockSize; let wY = y * totalBlockSize;
                        ctx.fillStyle = '#333'; ctx.fillRect(wX, wY, totalBlockSize, roadWidth); ctx.fillRect(wX, wY, roadWidth, totalBlockSize); 
                        ctx.strokeStyle = '#fff'; ctx.setLineDash([20, 20]); ctx.lineWidth = 4;
                        ctx.beginPath(); ctx.moveTo(wX + roadWidth, wY + roadWidth/2); ctx.lineTo(wX + totalBlockSize, wY + roadWidth/2);
                        ctx.moveTo(wX + roadWidth/2, wY + roadWidth); ctx.lineTo(wX + roadWidth/2, wY + totalBlockSize);
                        ctx.stroke(); ctx.setLineDash([]);
                        ctx.fillStyle = '#27ae60'; ctx.fillRect(wX + roadWidth, wY + roadWidth, blockSize, blockSize);
                    }
                }

                if ((gameState === 'racing' || gameState === 'pre_race') && player.cpIndex < currentRace.route.length) {
                    ctx.strokeStyle = 'rgba(255, 50, 50, 0.6)'; ctx.lineWidth = 20; ctx.lineJoin = 'round'; ctx.lineCap = 'round';
                    ctx.beginPath(); ctx.moveTo(player.x, player.y);
                    let lookAhead = Math.min(player.cpIndex + 3, currentRace.route.length);
                    for(let i = player.cpIndex; i < lookAhead; i++) ctx.lineTo(currentRace.route[i].x, currentRace.route[i].y);
                    ctx.stroke();

                    let nextCP = currentRace.route[player.cpIndex];
                    ctx.beginPath(); ctx.arc(nextCP.x, nextCP.y, 80, 0, Math.PI*2);
                    ctx.fillStyle = 'rgba(255, 0, 0, 0.3)'; ctx.fill(); ctx.strokeStyle = 'red'; ctx.lineWidth = 5; ctx.stroke();
                    
                    let lastCP = currentRace.route[currentRace.route.length - 1];
                    ctx.fillStyle = 'white';
                    for(let i=-60; i<60; i+=20) {
                        for(let j=-60; j<60; j+=20) { if((i+j)%40===0) ctx.fillRect(lastCP.x + i, lastCP.y + j, 20, 20); }
                    }
                }

                if(gameState === 'freeroam') {
                    raceStarters.forEach(rs => {
                        ctx.beginPath(); ctx.arc(rs.x, rs.y, 80, 0, Math.PI*2);
                        ctx.fillStyle = 'rgba(255, 50, 50, 0.3)'; ctx.fill(); ctx.strokeStyle = '#ff3333'; ctx.lineWidth = 4; ctx.stroke();
                    });
                }

                buildings.forEach(b => {
                    if (b.x + b.w > camera.x && b.x < camera.x + canvas.width && b.y + b.h > camera.y && b.y < camera.y + canvas.height) {
                        if(images[b.img]) ctx.drawImage(images[b.img], b.x, b.y, b.w, b.h);
                    }
                });

                bots.forEach(bot => {
                    if (bot.x > camera.x - 100 && bot.x < camera.x + canvas.width + 100 && bot.y > camera.y - 100 && bot.y < camera.y + canvas.height + 100) { bot.draw(ctx); }
                });

                // Online Arkadaşı Çiz
                if(otherPlayer.active) {
                    ctx.save(); ctx.translate(otherPlayer.x, otherPlayer.y); ctx.rotate(otherPlayer.angle + Math.PI/2);
                    if(images[otherPlayer.img]) ctx.drawImage(images[otherPlayer.img], -22, -44, 44, 88);
                    ctx.restore();
                    drawNameTag(otherPlayer.name, otherPlayer.x, otherPlayer.y, "#00ffcc");
                }

                // Kendimizi Çiz ve İsmi Yaz
                player.draw(ctx);
                drawNameTag(playerName, player.x, player.y, "gold");

                ctx.restore();
            }
            requestAnimationFrame(gameLoop);
        }

        // --- MENÜ VE ONLİNE BAĞLANTI SİSTEMİ ---
        
        function saveName() {
            let input = document.getElementById('player-name-input').value.trim();
            if(input.length > 0) {
                playerName = input;
                document.getElementById('name-screen').style.display = 'none';
                document.getElementById('menu-screen').style.display = 'flex';
                loadCarMenu();
            } else alert("Lütfen bir isim girin!");
        }

        function loadCarMenu() {
            const carListDiv = document.getElementById('car-list');
            carImagesNames.forEach(imgName => {
                const card = document.createElement('div'); card.className = 'car-card';
                card.innerHTML = `<img src="${imgName}" alt="Araba"><br/><span style="color:#fff">${imgName.split('.')[0].toUpperCase()}</span>`;
                card.onclick = () => {
                    player.img = imgName;
                    document.getElementById('menu-screen').style.display = 'none';
                    document.getElementById('lobby-screen').style.display = 'flex';
                    gameState = 'lobby';
                };
                carListDiv.appendChild(card);
            });
        }

        // PeerJS Bağlantı Ayarları
        function startHost() {
            document.getElementById('host-status').innerText = "Bağlantı kuruluyor...";
            peer = new Peer(); // Rastgele ID alır
            peer.on('open', id => {
                document.getElementById('my-code').innerText = id;
                document.getElementById('host-status').innerText = "Oda açıldı! Arkadaşın bekleniyor...";
            });
            peer.on('connection', conn => {
                setupConnection(conn);
            });
        }

        function joinRoom() {
            let code = document.getElementById('join-code-input').value.trim();
            if(!code) return alert("Lütfen bir kod girin!");
            document.getElementById('join-status').innerText = "Bağlanılıyor...";
            
            if(!peer) peer = new Peer();
            peer.on('open', () => {
                let conn = peer.connect(code);
                setupConnection(conn);
            });
        }

        function setupConnection(conn) {
            connection = conn;
            connection.on('open', () => {
                // Bağlantı başarılı! Oyuna geç.
                document.getElementById('lobby-screen').style.display = 'none';
                document.getElementById('ui').style.display = 'block';
                gameState = 'freeroam';
            });
            
            connection.on('data', data => {
                if(data.type === 'UPDATE') {
                    otherPlayer.active = true;
                    otherPlayer.x = data.x;
                    otherPlayer.y = data.y;
                    otherPlayer.angle = data.angle;
                    otherPlayer.img = data.img;
                    otherPlayer.name = data.name;
                    otherPlayer.inRace = data.inRace;
                    otherPlayer.cpIndex = data.cpIndex;
                }
                if(data.type === 'RACE_START') {
                    // Arkadaş yarışı başlattıysa biz de ona katılalım!
                    startRaceLogic(data.starter, true, data.route);
                }
            });
        }

        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
        gameLoop();
    </script>
</body>
